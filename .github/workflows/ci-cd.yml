name: CHATAPP - .NET + Angular CI/CD Pipeline

# Kích hoạt workflow khi có push hoặc pull request lên nhánh main
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# Các jobs sẽ chạy
jobs:
  # JOB 1: Build và Test Backend (.NET)
  build-dotnet:
    runs-on: ubuntu-latest  # Chạy trên máy ảo Ubuntu của GitHub
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4  # Lấy code từ repository về
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'  #phiên bản .NET 
    
    - name: Restore dependencies
      run: dotnet restore ./server/Chat_ServerNet.sln  
    
    - name: Build project
      run: dotnet build ./server/Chat_ServerNet.sln --configuration Release --no-restore

    #- name: Run tests
    #  run: dotnet test ./server/ChatServer.API/ChatServer.API.csproj --configuration Release --no-build --verbosity normal

  # JOB 2: Build và Test Frontend (Angular)
  build-angular:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'  #  phiên bản Node
    
    - name: Install dependencies
      working-directory: ./client  # <-- SỬA TÊN THƯ MỤC Angular
      run: npm ci  # 'ci' nhanh hơn 'install' trong CI/CD
    
    - name: Build Angular
      working-directory: ./client
      run: npm run build -- --configuration production
    
    #- name: Run Angular tests
    #  working-directory: ./client
    #  run: npm test -- --watch=false --browsers=ChromeHeadless  # Chạy test không cần UI

  # JOB 3: Xây dựng và đẩy Docker image (chỉ chạy khi 2 job trên thành công)
  docker-build-push:
    runs-on: ubuntu-latest
    needs: [build-dotnet, build-angular]  # Đợi 2 job kia xong
    # Chỉ chạy khi code được push vào main (không chạy cho pull request)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}  # GitHub tự tạo secret này
    
    - name: Build and push Docker Backend image
      uses: docker/build-push-action@v5
      with:
        context: ./server  # Thư mục chứa Dockerfile cua server
        push: true
        tags: ghcr.io/${{ github.repository }}-server:latest  
        # Tên image: ghcr.io/username/repo-name-server:latest
    
    - name: Build and push Docker Frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./client  # Thư mục chứa Dockerfile cua server
        push: true
        tags: ghcr.io/${{ github.repository }}-client:latest  
        # Tên image: ghcr.io/username/repo-name-client:latest
