<div class="flex flex-col h-full bg-white">

    <!-- HEADER -->
    <div
        class="h-16 border-b border-gray-100 flex items-center justify-between px-6 bg-white backdrop-blur-md sticky top-0 z-10">
        <div class="flex items-center gap-3">
            <div class="relative">
                <img src="https://ui-avatars.com/api/?name=Alice&background=random" alt=""
                    class="w-10 h-10 rounded-full shadow-sm">
                <span class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></span>
            </div>
            <div>
                <h3 class="font-bold text-gray-800 leading-tight">Nam Doan</h3>
                <span class="text-xs text-green-600 font-medium">Online</span>
            </div>
        </div>
    </div>

    <!-- BODY: Danh sach tin nhan -->
    <!-- flex-1: chiem het chieu cao con lai -->
    <!-- overflow-y-auto: cuon doc khi nhieu tin nhan -->
    <div class="flex-1 overflow-y-auto p-6 space-y-6">
        <!-- dong phan cach ngay -->
        <div class="flex items-center gap-4 py-2">
            <div class="h-px bg-gray-100 flex-1"></div>
            <span class="text-xs font-medium text-gray-400 uppercase tracking-wider">Today</span>
            <div class="h-px bg-gray-100 flex-1"></div>
        </div>

        <!-- Tin nhan den (ben trai - mau xam) -->
        <div class="flex gap-3 max-w-[75%]">
            <img src="https://ui-avatars.com/api/?name=Alice&background=random"
                class="w-8 h-8 rounded-full mt-auto mb-1">
            <div class="group">
                <div class="bg-gray-100 text-gray-800 px-4 py-3 rounded-2xl rounded-bl-none shadow-sm">
                    <p class="leading-relaxed">Hello! I've reviewed your designs. Looks great!</p>
                </div>

                <!-- Hien time khi hover -->
                <span
                    class="text-[11px] text-gray-400 mt-1 block pl-1 opacity-0 group-hover:opacity-100 transition-opacity">
                    10:30 AM
                </span>
            </div>
        </div>

        <!-- Tin nhan di - ben phai, mau xanh -->
        <div class="flex flex-col items-end gap-1 ml-auto max-w-[75%]">
            <div class="bg-blue-600 text-white px-4 py-3 rounded-2xl rounded-br-none shadow-md shadow-blue-500/20">
                <p class="leading-relaxed">Thanks! Let me know if you need any changes.</p>
            </div>
            <span class="text-[11px] text-gray-300 mr-1">10:43 AM · Read</span>
        </div>
    </div>

    <!-- Footer: o nhap tin nhan -->
    <div class="p-4 border-t border-gray-100 bg-white">
        <div
            class="flex items-end gap-2 bg-gray-50 border border-gray-200 p-2 rounded-2xl focus-within:ring-2 focus-within:ring-blue-100 focus-within:border-blue-400 transition-all">

            <app-ui-button variant="ghost" size="sm">
                <app-ui-icon name="paperclip" [size]="20"></app-ui-icon>
            </app-ui-button>

            <!-- Ô nhập tin nhắn -->
            <textarea rows="1" placeholder="Type your message..."
                class="flex-1 bg-transparent border-none focus:ring-0 text-gray-800 placeholder:text-gray-400 resize-none py-2 max-h-32"></textarea>

            <app-ui-button variant="primary" size="md">
                <app-ui-icon name="send" [size]="18"></app-ui-icon>
            </app-ui-button>
            <!-- Nút đính kèm file -->

                    <path d="M22 2 11 13" />

        </div>
    </div>
</div>
