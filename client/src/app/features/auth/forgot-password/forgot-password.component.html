<div class="w-full max-w-md bg-white rounded-lg shadow-lg p-8">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-primary">Quên mật khẩu?</h1>
        <p class="text-text-muted mt-2">Nhập email để lấy lại mật khẩu</p>
    </div>

    @if (!isSent) {
    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="space-y-6">
        <app-ui-input label="Email" type="email" placeholder="name@example.com" formControlName="email"
            [error]="getError('email')"></app-ui-input>

        <app-ui-button type="submit" [block]="true" [isLoading]="isSubmitting">
            Gửi yêu cầu
        </app-ui-button>
    </form>
    } @else {
    <div class="text-center space-y-4 animate-fade-in">
        <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                <polyline points="22 4 12 14.01 9 11.01" />
            </svg>
        </div>
        <h3 class="text-lg font-medium text-gray-900">Kiểm tra email của bạn</h3>
        <p class="text-text-muted">Chúng tôi đã gửi hướng dẫn đặt lại mật khẩu tới email của bạn.</p>
        <button (click)="isSent = false" class="text-primary hover:underline font-medium">Thử lại</button>
    </div>
    }

    <div class="mt-6 text-center text-sm text-text-muted">
        Quay lại
        <a routerLink="/login" class="font-medium text-primary hover:underline">
            Đăng nhập
        </a>
    </div>
</div>
